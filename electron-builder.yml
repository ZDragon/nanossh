appId: com.sshclient.app
productName: SSH Client
copyright: Copyright © ${year} Alexander Kozlov (Silver Dragon)

directories:
  output: release
  buildResources: resources

files:
  - out/**
  - package.json

asarUnpack:
  # ssh2 pulls optional native addon cpu-features; keep it unpacked
  - node_modules/ssh2/**
  - node_modules/cpu-features/**

# ───── Windows ─────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: SSH Client
  createDesktopShortcut: true

# ───── macOS ───────────────────────────────────────────────
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: false
  gatekeeperAssess: false
  artifactName: ${productName}-${version}-${arch}.${ext}

dmg:
  title: ${productName} ${version}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ───── Linux ───────────────────────────────────────────────
linux:
  category: Network
  synopsis: SSH / SFTP desktop client with terminal and file explorer
  description: >-
    Multi-session SSH / SFTP client combining a tabbed terminal with a
    dual-pane file explorer, edit-in-place for remote files, and port
    forwarding (-L / -R / -D).
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
    - target: rpm
      arch: [x64]
    - target: tar.gz
      arch: [x64, arm64]
  artifactName: ${productName}-${version}-${arch}.${ext}
  desktop:
    entry:
      Name: SSH Client
      Comment: SSH / SFTP desktop client
      Keywords: ssh;sftp;terminal;remote;
